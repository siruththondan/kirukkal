<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>தமிழ் Scribble</title>
  <script>
    // GitHub Pages SPA redirect hack
    // Redirects 404s back to index.html while preserving the URL
    var pathSegmentsToKeep = 1; // = number of path segments in base URL (/tamil-scribble/)
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
