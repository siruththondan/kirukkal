<!doctype html>
<html lang="ta" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/tamil-scribble/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>தமிழ் Scribble 🎨</title>
    <meta name="description" content="Draw and guess Tamil words with friends! Real-time multiplayer, Tamil + Tanglish + English." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Philosopher:ital,wght@0,400;0,700;1,400&family=Noto+Sans+Tamil:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script>
      // Apply saved theme before React loads (prevents flash)
      try {
        const t = localStorage.getItem('ts-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
      } catch(e){}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
